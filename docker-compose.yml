services:
  db:
    image: postgres:16
    container_name: multi-sucursal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: multi_sucursal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multi-sucursal-back
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      FLASK_APP: run.py
      PORT: 5000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: multi_sucursal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@db:5432/multi_sucursal
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: jwt-dev-secret
      JWT_ACCESS_TOKEN_HOURS: 5
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m flask --app run.py db upgrade &&
             python -m flask --app run.py seed datos-base &&
             python run.py"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multi-sucursal-front
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: >
      sh -c "npm install &&
             npm run start:docker"

volumes:
  postgres_data:
  frontend_node_modules:
